name: actv1-ci

on:
  push:
    paths:
      - "actv1/**"
  pull_request:
    paths:
      - "actv1/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: actv1

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: precursa
          POSTGRES_PASSWORD: precursa
          POSTGRES_DB: precursa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U precursa -d precursa"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://precursa:precursa@localhost:5432/precursa
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-secret-key
      SEED_ON_STARTUP: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Lint
        run: python -m ruff check .

      - name: Apply migrations
        run: python -m alembic upgrade head

      - name: Run tests
        run: python -m pytest

      - name: Boot service and verify health
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          APP_PID=$!
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8000/health
          curl -fsS http://127.0.0.1:8000/ready
          kill ${APP_PID}
